source:
  host: "mail.example.com"
  port: "993"
  username: "test@test"
  password: "test"
  use_tls: true
  insecure_tls: true

# destination:
#   host: "mail.example.com"
#   port: "993"
#   username: "mail.example.com"
#   password: "asdasd"
#   use_tls: true
#   insecure_tls: true

# Alternative: export to EML files instead of IMAP destination
output_dir: "/home/hein/mail"

# Optional: subdirectory in destination to preserve source structure
# Example: "Archive" will create "Archive/INBOX", "Archive/Sent", etc.
# subdirectory: "Archive"

# Optional: date range filtering - only sync messages within these dates
# Formats supported: YYYY-MM-DD, YYYY-MM-DDTHH:MM:SS, YYYY-MM-DD HH:MM:SS
# date_from: "2024-01-01"        # Only sync messages from this date onwards
# date_to: "2024-12-31"          # Only sync messages up to this date
# date_from: "2024-06-01T00:00:00"  # With time specification
# date_to: "2024-06-30T23:59:59"    # With time specification

dry_run: false

# output_format: "eml"  # default: eml, alternative: zip

# Standalone Maildir source (read directly from local Maildir)
# maildir_source:
#   path: "/home/user/Maildir"
#   domain: "example.com"
#   user: "user"

# Virtualmin integration - enumerate domains/users and sync their mail
# virtualmin:
#   mode: "local"         # "local" | "ssh" | "api"
#   domain: ""            # optional: filter to single domain
#   maildir_base: ""      # optional: default "/home/%s/homes/%s/Maildir"
#
#   # SSH mode config:
#   ssh:
#     host: "server.example.com"
#     port: "22"
#     username: "root"
#     key_file: "/home/user/.ssh/id_rsa"
#     # password: "secret"  # alternative to key_file
#
#   # API mode config:
#   api:
#     host: "server.example.com"
#     port: "10000"
#     username: "admin"
#     password: "secret"
#     use_tls: true
#     insecure_tls: false
#     ssh:                   # for reading mail via SSH in API mode
#       host: "server.example.com"
#       port: "22"
#       username: "root"
#       key_file: "/home/user/.ssh/id_rsa"